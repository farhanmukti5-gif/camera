<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SNAP·24</title>
<style>
  :root {
    --body:   #15171a;
    --body2:  #1d2024;
    --panel:  #101214;
    --amber:  #ff8a1e;
    --ambd:   #9a5a16;
    --teal:   #1fb6a6;
    --frame:  #2a2e33;
    --text:   #e7e3da;
    --dim:    #7c8088;
    --shtr:   #e8e4db;
    --red:    #e0533d;
  }
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    background: var(--body);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; justify-content: center;
  }

  /* ── device shell ── */
  .device {
    width: 100%; max-width: 480px; height: 100dvh;
    display: flex; flex-direction: column;
    background: radial-gradient(120% 80% at 50% -10%, #20242a 0%, var(--body) 55%);
    position: relative;
  }

  /* ── top bar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 10px; flex-shrink: 0;
  }
  .brand { display: flex; align-items: baseline; gap: 8px; }
  .brand .mark { font-weight: 800; letter-spacing: .5px; font-size: 15px; }
  .brand .sub  { font-size: 10px; color: var(--teal); letter-spacing: 2px; text-transform: uppercase; }
  .counter {
    font-family: "Courier New", monospace;
    font-size: 13px; color: var(--amber);
    background: #000; border: 1px solid var(--ambd);
    padding: 4px 9px; border-radius: 3px;
    text-shadow: 0 0 6px var(--ambd); letter-spacing: 1px;
  }
  .counter small { color: var(--dim); text-shadow: none; }

  /* ── viewfinder ── */
  .stage {
    flex: 1; position: relative; margin: 0 14px;
    border-radius: 10px; overflow: hidden;
    background: #000; border: 1px solid var(--frame);
    min-height: 0;
  }
  #video {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover;
  }
  #video.mirror { transform: scaleX(-1); }

  /* live grade overlay — CSS only, 60fps safe */
  .live-grade {
    position: absolute; inset: 0; pointer-events: none;
    /* warm cast */
    background:
      radial-gradient(ellipse 110% 110% at 50% 50%,
        rgba(255,160,40,.04) 0%,
        rgba(0,0,0,0) 60%,
        rgba(0,0,0,.50) 100%),
      linear-gradient(180deg, rgba(255,130,20,.03) 0%, rgba(20,30,50,.04) 100%);
  }

  /* viewfinder corner brackets */
  .vf-corners { position: absolute; inset: 0; pointer-events: none; }
  .vf-corners::before, .vf-corners::after,
  .vf-corners2::before, .vf-corners2::after {
    content: ""; position: absolute; width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,.5);
  }
  .vf-corners::before  { top: 14px; left: 14px;  border-right: 0; border-bottom: 0; }
  .vf-corners::after   { bottom: 14px; right: 14px; border-left: 0; border-top: 0; }
  .vf-corners2 { position: absolute; inset: 0; pointer-events: none; }
  .vf-corners2::before { top: 14px; right: 14px;  border-left: 0; border-bottom: 0; }
  .vf-corners2::after  { bottom: 14px; left: 14px; border-right: 0; border-top: 0; }

  /* flash white overlay */
  .flash-overlay {
    position: absolute; inset: 0; background: #fff;
    opacity: 0; pointer-events: none; transition: opacity .05s;
    border-radius: 10px;
  }
  .flash-overlay.pop { opacity: .92; transition: opacity .05s; }
  .flash-overlay.fade { opacity: 0; transition: opacity .4s ease-out; }

  /* state overlays (loading / error) */
  .state {
    position: absolute; inset: 0; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    text-align: center; padding: 28px;
    background: rgba(8,9,10,.92); border-radius: 10px;
  }
  .state.show { display: flex; }
  .state h3 { margin: 0; font-size: 15px; }
  .state p  { margin: 0; font-size: 13px; color: var(--dim); line-height: 1.55; max-width: 300px; }
  .state .alt-btn {
    margin-top: 6px; background: var(--teal); color: #062b27;
    border: 0; padding: 11px 20px; border-radius: 8px;
    font-weight: 700; font-size: 14px; cursor: pointer;
  }

  /* ── bottom controls ── */
  .controls {
    flex-shrink: 0;
    padding: 16px 18px calc(16px + env(safe-area-inset-bottom));
    display: flex; align-items: center; justify-content: space-between;
  }
  .iconbtn {
    width: 52px; height: 52px; border-radius: 14px;
    background: var(--body2); border: 1px solid var(--frame);
    color: var(--text); display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer;
  }
  .iconbtn:active { background: #2a2e33; }
  .shutter-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .shutter {
    width: 74px; height: 74px; border-radius: 50%;
    background: radial-gradient(circle at 50% 35%, #fff, var(--shtr) 60%, #b8b4ab);
    border: 4px solid #3a3e44;
    box-shadow: 0 6px 14px rgba(0,0,0,.5), inset 0 2px 3px rgba(255,255,255,.7);
    cursor: pointer;
  }
  .shutter:active { transform: scale(.93); }
  .shutter:disabled { opacity: .3; cursor: default; }
  .shutter-lbl { font-size: 9px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }

  /* ── gallery strip ── */
  .gallery {
    flex-shrink: 0; height: 0; overflow: hidden;
    transition: height .25s; background: var(--panel);
  }
  .gallery.open { height: 96px; }
  .gallery-inner {
    display: flex; gap: 8px; padding: 12px;
    overflow-x: auto; height: 100%; align-items: center;
  }
  .gallery-inner .empty { color: var(--dim); font-size: 12px; padding: 0 6px; }
  .thumb {
    height: 66px; width: 66px; flex-shrink: 0;
    border-radius: 6px; object-fit: cover;
    border: 1px solid var(--frame); cursor: pointer;
  }

  /* ── photo modal ── */
  .modal {
    position: absolute; inset: 0; background: rgba(0,0,0,.95);
    z-index: 40; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px; padding: 20px;
  }
  .modal.show { display: flex; }
  .modal img { max-width: 100%; max-height: 72%; border-radius: 6px; }
  .modal-actions { display: flex; gap: 12px; }
  .modal-actions a,
  .modal-actions button {
    text-decoration: none;
    padding: 11px 18px; border-radius: 8px;
    font-weight: 700; font-size: 14px; border: 0; cursor: pointer;
  }
  .btn-save  { background: var(--teal); color: #062b27; }
  .btn-del   { background: var(--red);  color: #2a0d08; }
  .btn-close { background: var(--body2); color: var(--text); border: 1px solid var(--frame) !important; }
</style>
</head>
<body>
<div class="device">

  <!-- top bar -->
  <div class="topbar">
    <div class="brand">
      <span class="mark">SNAP·24</span>
      <span class="sub">disposable</span>
    </div>
    <div class="counter">
      <span id="rem">24</span><small>/24</small>
    </div>
  </div>

  <!-- viewfinder -->
  <div class="stage">
    <video id="video" playsinline autoplay muted></video>
    <div class="live-grade"></div>
    <div class="vf-corners"></div>
    <div class="vf-corners2"></div>
    <div class="flash-overlay" id="flashEl"></div>

    <div class="state show" id="stateLoading">
      <h3>Menyalakan kamera…</h3>
      <p>Izinkan akses kamera saat diminta.</p>
    </div>
    <div class="state" id="stateError">
      <h3>Kamera tidak bisa diakses</h3>
      <p id="errMsg">Buka file ini langsung di Chrome atau Safari via HTTPS, atau coba efeknya dengan foto:</p>
      <button class="alt-btn" id="btnFallback">Pilih foto dari galeri</button>
    </div>
  </div>

  <!-- gallery strip -->
  <div class="gallery" id="gallery">
    <div class="gallery-inner" id="galleryInner">
      <div class="empty">Belum ada foto.</div>
    </div>
  </div>

  <!-- controls -->
  <div class="controls">
    <button class="iconbtn" id="btnFlip" title="Ganti kamera">⟳</button>
    <div class="shutter-wrap">
      <button class="shutter" id="btnShutter"></button>
      <span class="shutter-lbl">shoot</span>
    </div>
    <button class="iconbtn" id="btnGallery" title="Galeri">▦</button>
  </div>

  <!-- photo modal -->
  <div class="modal" id="modal">
    <img id="modalImg" src="" alt="">
    <div class="modal-actions">
      <a id="btnSave" class="btn-save" download="snap.jpg">Simpan</a>
      <button class="btn-del"   id="btnDel">Hapus</button>
      <button class="btn-close" id="btnClose">Tutup</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" hidden>

<script>
"use strict";

/* ─────────────────────────────────────────────
   HARDCODED LOOK — Kodak FunSaver / ISO 800
   Based on: warm reds/yellows, black lift,
   flash bloom, halation, green-teal shadows,
   heavy grain (ISO 800 character), vignette,
   chromatic aberration (plastic lens).
   No user-facing controls.
───────────────────────────────────────────── */
const LOOK = {
  // Basic tonal adjustments (Lightroom-equivalent intent)
  exposure:    0.08,   // very slight lift (flash scene)
  contrast:    0.22,   // punchy contrast
  saturation:  0.20,   // Kodak vivid colours
  warmth:      28,     // additive R, subtractive B — yellow/orange push

  // Black lift — "faded" matte look (Lightroom: lift bottom of point curve)
  blackLift:   18,     // blacks → soft grey floor (0 = none, 255 = max)

  // Split-tone: highlights warm, shadows green-teal (film C-41 character)
  hlWarm:      0.06,   // additive orange in highlights (luma > 160)
  shGreen:     0.04,   // additive green-teal in shadows (luma < 80)

  // Grain — ISO 800 film, coarse luminance grain
  grain:       34,

  // Vignette intensity (0–1)
  vignette:    0.62,

  // Chromatic aberration — plastic lens fringing (pixels, edge-weighted)
  ca:          2.5,

  // Light leak — probability per shot, direction random
  leakProb:    0.40,

  // Halation radius ratio (light bleed around bright areas)
  halation:    true,

  // Date stamp
  dateStamp:   true,

  // Output resolution long-edge (px) — 1080 keeps file small, good for web
  outputSize:  1080,
};

/* ─── state ─── */
const TOTAL = 24;
let photos   = [];
let facingMode = "environment";
let stream   = null;
let busy     = false;

const video    = document.getElementById("video");
const flashEl  = document.getElementById("flashEl");
const remEl    = document.getElementById("rem");
const shutter  = document.getElementById("btnShutter");

/* ─── camera ─── */
async function startCamera() {
  showState("stateLoading");
  if (stream) stream.getTracks().forEach(t => t.stop());
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1920 } },
      audio: false,
    });
    video.srcObject = stream;
    video.classList.toggle("mirror", facingMode === "user");
    await video.play();
    hideState("stateLoading");
    hideState("stateError");
  } catch (e) {
    hideState("stateLoading");
    document.getElementById("errMsg").textContent =
      location.protocol !== "https:" && location.hostname !== "localhost"
        ? "Butuh HTTPS untuk kamera. Untuk test efeknya, coba pilih foto:"
        : "Perangkat / browser memblokir kamera di sini. Buka di Chrome/Safari, atau test efek pakai foto:";
    showState("stateError");
  }
}
function showState(id) { document.getElementById(id).classList.add("show"); }
function hideState(id) { document.getElementById(id).classList.remove("show"); }

/* ─── capture ─── */
function capture() {
  if (busy) return;
  if (photos.length >= TOTAL) { flashCounter(); return; }
  if (!stream && !document.getElementById("stateError").classList.contains("show")) return;
  busy = true;
  triggerFlash(() => {
    processFrame(video, video.videoWidth, video.videoHeight, facingMode === "user");
    busy = false;
  });
}

function triggerFlash(cb) {
  flashEl.className = "flash-overlay pop";
  setTimeout(() => {
    flashEl.className = "flash-overlay fade";
    cb();
  }, 90);
}

/* ─── main image processing pipeline ─── */
function processFrame(src, sw, sh, mirror) {
  if (!sw || !sh) { busy = false; return; }

  /* canvas at output resolution */
  const long = LOOK.outputSize;
  let w, h;
  if (sw >= sh) { w = long; h = Math.round(long * sh / sw); }
  else          { h = long; w = Math.round(long * sw / sh); }

  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  const ctx = c.getContext("2d");

  /* draw — cover-crop + mirror front cam */
  if (mirror) { ctx.translate(w, 0); ctx.scale(-1, 1); }
  const ar = w / h, sar = sw / sh;
  let dw, dh, dx, dy;
  if (sar > ar) { dh = h; dw = h * sar; dx = (w - dw) / 2; dy = 0; }
  else          { dw = w; dh = w / sar; dx = 0; dy = (h - dh) / 2; }
  ctx.drawImage(src, dx, dy, dw, dh);
  ctx.setTransform(1, 0, 0, 1, 0, 0);

  /* ── per-pixel pass ── */
  const imgData = ctx.getImageData(0, 0, w, h);
  applyPixelGrade(imgData, w, h);
  ctx.putImageData(imgData, 0, 0);

  /* ── vignette (multiply layer) ── */
  applyVignette(ctx, w, h);

  /* ── halation (light bleed around bright areas) ── */
  if (LOOK.halation) applyHalation(ctx, w, h);

  /* ── light leak (random) ── */
  if (Math.random() < LOOK.leakProb) applyLightLeak(ctx, w, h);

  /* ── flash bloom (centre bright wash) ── */
  applyFlashBloom(ctx, w, h);

  /* ── date stamp ── */
  if (LOOK.dateStamp) applyDateStamp(ctx, w, h);

  const url = c.toDataURL("image/jpeg", 0.88);
  addPhoto(url);
}

/* ─── per-pixel grade ─── */
function applyPixelGrade(imgData, w, h) {
  const d = imgData.data;
  const L = LOOK;
  const expF   = 1 + L.exposure;
  const conF   = 1 + L.contrast;
  const satF   = 1 + L.saturation;
  const warm   = L.warmth;
  const bl     = L.blackLift;
  const ca     = L.ca;
  const grain  = L.grain;

  /* chromatic aberration source copy */
  const src = ca > 0 ? new Uint8ClampedArray(d) : null;

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      let r = d[i], g = d[i+1], b = d[i+2];

      /* chromatic aberration (shift R right, B left, edge-weighted) */
      if (src) {
        const ex = (x / w - 0.5) * 2;
        const ey = (y / h - 0.5) * 2;
        const edge = Math.min(1, Math.hypot(ex, ey));
        const off  = Math.round(ca * edge);
        const rx   = Math.min(w - 1, x + off);
        const bx   = Math.max(0, x - off);
        r = src[(y * w + rx) * 4];
        b = src[(y * w + bx) * 4 + 2];
      }

      /* exposure */
      r *= expF; g *= expF; b *= expF;

      /* contrast around 128 */
      r = (r - 128) * conF + 128;
      g = (g - 128) * conF + 128;
      b = (b - 128) * conF + 128;

      /* warmth — push reds/yellows, pull blues */
      r += warm;
      g += warm * 0.25;
      b -= warm * 0.55;

      /* saturation */
      const lum = 0.299 * r + 0.587 * g + 0.114 * b;
      r = lum + (r - lum) * satF;
      g = lum + (g - lum) * satF;
      b = lum + (b - lum) * satF;

      /* black lift — raise shadow floor */
      const ratio = bl / 255;
      r = r * (1 - ratio) + bl;
      g = g * (1 - ratio) + bl;
      b = b * (1 - ratio) + bl;

      /* split-tone: warm highlights, green-teal shadows */
      const lum2 = 0.299 * r + 0.587 * g + 0.114 * b;
      if (lum2 > 160) {
        const t = (lum2 - 160) / 95;         // 0→1 in highlight zone
        r += t * 255 * L.hlWarm * 1.0;
        g += t * 255 * L.hlWarm * 0.45;
        b -= t * 255 * L.hlWarm * 0.30;
      }
      if (lum2 < 80) {
        const t = 1 - lum2 / 80;             // 0→1 in shadow zone
        g += t * 255 * L.shGreen * 0.80;
        b += t * 255 * L.shGreen * 0.60;
        r -= t * 255 * L.shGreen * 0.20;
      }

      /* grain (luminance noise, coarse) */
      const noise = (Math.random() - 0.5) * grain;
      r += noise; g += noise; b += noise;

      d[i]   = r;
      d[i+1] = g;
      d[i+2] = b;
    }
  }
}

/* ─── vignette ─── */
function applyVignette(ctx, w, h) {
  ctx.globalCompositeOperation = "multiply";
  const v = LOOK.vignette;
  const g = ctx.createRadialGradient(w/2, h/2, Math.min(w,h)*0.28, w/2, h/2, Math.max(w,h)*0.70);
  const floor = Math.round(255 * (1 - v));
  g.addColorStop(0, "rgba(255,255,255,1)");
  g.addColorStop(1, `rgb(${floor},${floor},${Math.round(floor*0.9)})`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  ctx.globalCompositeOperation = "source-over";
}

/* ─── halation — warm glow around bright regions ─── */
function applyHalation(ctx, w, h) {
  /* sample halation from a blurred brightened copy */
  const tmp = document.createElement("canvas");
  tmp.width = Math.round(w * 0.25);
  tmp.height = Math.round(h * 0.25);
  const tc = tmp.getContext("2d");
  tc.filter = "blur(8px) brightness(1.6)";
  tc.drawImage(ctx.canvas, 0, 0, tmp.width, tmp.height);

  ctx.globalCompositeOperation = "screen";
  ctx.globalAlpha = 0.28;
  ctx.drawImage(tmp, 0, 0, w, h);
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = "source-over";
}

/* ─── light leak ─── */
function applyLightLeak(ctx, w, h) {
  ctx.globalCompositeOperation = "screen";
  const corners = [[0,0],[w,0],[0,h],[w,h]];
  const [cx, cy] = corners[Math.floor(Math.random() * 4)];
  const radius   = Math.max(w, h) * (0.55 + Math.random() * 0.3);
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  // Kodak leaks tend orange-red, occasionally yellow
  const warm = Math.random() < 0.65;
  const col  = warm ? "255,80,20" : "255,170,30";
  const alpha = 0.22 + Math.random() * 0.20;
  g.addColorStop(0,   `rgba(${col},${alpha})`);
  g.addColorStop(0.35,`rgba(${col},${alpha * 0.45})`);
  g.addColorStop(1,   `rgba(${col},0)`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  ctx.globalCompositeOperation = "source-over";
}

/* ─── flash bloom — bright wash from centre (direct flash) ─── */
function applyFlashBloom(ctx, w, h) {
  ctx.globalCompositeOperation = "screen";
  const g = ctx.createRadialGradient(w*0.5, h*0.44, 0, w*0.5, h*0.44, Math.max(w,h)*0.55);
  g.addColorStop(0,   "rgba(255,248,230,0.30)");
  g.addColorStop(0.5, "rgba(255,248,230,0.06)");
  g.addColorStop(1,   "rgba(255,248,230,0)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  ctx.globalCompositeOperation = "source-over";
}

/* ─── date stamp — amber LCD, bottom-right ─── */
function applyDateStamp(ctx, w, h) {
  const now = new Date();
  const yy  = now.getFullYear();
  const mm  = String(now.getMonth() + 1).padStart(2, " ");
  const dd  = String(now.getDate()).padStart(2, " ");
  const txt = `${yy}  ${mm}  ${dd}`;
  const sz  = Math.round(w * 0.044);
  ctx.font         = `700 ${sz}px "Courier New", monospace`;
  ctx.textAlign    = "right";
  ctx.textBaseline = "bottom";
  const px = w - Math.round(sz * 0.7);
  const py = h - Math.round(sz * 0.65);
  ctx.shadowColor  = "rgba(255,80,0,0.85)";
  ctx.shadowBlur   = sz * 0.55;
  ctx.fillStyle    = "rgba(255,145,25,0.92)";
  ctx.fillText(txt, px, py);
  ctx.shadowBlur   = 0;
}

/* ─── gallery ─── */
function addPhoto(url) {
  photos.unshift(url);
  renderCounter();
  renderGallery();
  document.getElementById("gallery").classList.add("open");
}

function renderCounter() {
  remEl.textContent = TOTAL - photos.length;
  shutter.disabled  = photos.length >= TOTAL;
}

function renderGallery() {
  const gi = document.getElementById("galleryInner");
  if (!photos.length) {
    gi.innerHTML = '<div class="empty">Belum ada foto.</div>';
    return;
  }
  gi.innerHTML = "";
  photos.forEach((url, idx) => {
    const img = document.createElement("img");
    img.src = url; img.className = "thumb";
    img.onclick = () => openModal(idx);
    gi.appendChild(img);
  });
}

function flashCounter() {
  const c = document.querySelector(".counter");
  c.style.color = "var(--red)";
  setTimeout(() => c.style.color = "", 500);
}

/* ─── modal ─── */
let modalIdx = -1;
function openModal(i) {
  modalIdx = i;
  document.getElementById("modalImg").src = photos[i];
  document.getElementById("btnSave").href  = photos[i];
  document.getElementById("btnSave").download = `snap-${Date.now()}.jpg`;
  document.getElementById("modal").classList.add("show");
}
document.getElementById("btnClose").onclick = () =>
  document.getElementById("modal").classList.remove("show");
document.getElementById("btnDel").onclick = () => {
  if (modalIdx > -1) {
    photos.splice(modalIdx, 1);
    renderCounter();
    renderGallery();
    if (!photos.length) document.getElementById("gallery").classList.remove("open");
    document.getElementById("modal").classList.remove("show");
  }
};

/* ─── controls ─── */
document.getElementById("btnShutter").onclick = capture;

document.getElementById("btnFlip").onclick = () => {
  facingMode = facingMode === "user" ? "environment" : "user";
  startCamera();
};

document.getElementById("btnGallery").onclick = () => {
  const g = document.getElementById("gallery");
  if (photos.length) g.classList.toggle("open");
};

/* ─── fallback: upload photo and apply effects ─── */
document.getElementById("btnFallback").onclick = () =>
  document.getElementById("fileInput").click();

document.getElementById("fileInput").onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    hideState("stateError");
    processFrame(img, img.naturalWidth, img.naturalHeight, false);
  };
  img.src = URL.createObjectURL(file);
};

/* ─── init ─── */
renderCounter();
startCamera();
</script>
</body>
</html>
